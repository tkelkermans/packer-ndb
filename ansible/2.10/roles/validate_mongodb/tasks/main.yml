---
- name: Normalize OS facts
  ansible.builtin.set_fact:
    ndb_os_family: "{{ ansible_facts['os_family'] }}"

- name: Build MongoDB validation service list
  ansible.builtin.set_fact:
    validate_mongodb_services:
      - label: firewalld
        unit: firewalld.service
      - label: chrony
        unit: "{{ 'chronyd.service' if ndb_os_family == 'RedHat' else 'chrony.service' }}"
      - label: cron
        unit: "{{ 'crond.service' if ndb_os_family == 'RedHat' else 'cron.service' }}"
    validate_mongodb_enabled_status_values:
      - enabled
      - enabled-runtime
      - static
      - indirect
      - generated

- name: Check required MongoDB image services are active
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - "{{ item.unit }}"
  loop: "{{ validate_mongodb_services }}"
  loop_control:
    label: "{{ item.label }}"
  register: validate_mongodb_service_active_result
  retries: "{{ validate_mongodb_service_active_retries }}"
  delay: "{{ validate_mongodb_service_active_delay }}"
  until: validate_mongodb_service_active_result.stdout == "active"
  changed_when: false
  failed_when: false
  become: yes

- name: Assert required MongoDB image services are active
  ansible.builtin.assert:
    that:
      - item.stdout == "active"
    fail_msg: "Expected service {{ item.item.unit }} to be active, got {{ item.stdout | default('') | trim }}"
  loop: "{{ validate_mongodb_service_active_result.results }}"
  loop_control:
    label: "{{ item.item.label }}"

- name: Check required MongoDB image services are enabled
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - "{{ item.unit }}"
  loop: "{{ validate_mongodb_services }}"
  loop_control:
    label: "{{ item.label }}"
  register: validate_mongodb_service_enabled_results
  changed_when: false
  failed_when: false
  become: yes

- name: Assert required MongoDB image services are enabled
  ansible.builtin.assert:
    that:
      - item.stdout in validate_mongodb_enabled_status_values
    fail_msg: "Expected service {{ item.item.unit }} to be enabled, got {{ item.stdout | default('') | trim }}"
  loop: "{{ validate_mongodb_service_enabled_results.results }}"
  loop_control:
    label: "{{ item.item.label }}"

- name: Check firewalld SSH service rule
  ansible.builtin.command:
    argv:
      - firewall-cmd
      - --query-service=ssh
  register: validate_firewalld_ssh_rule
  changed_when: false
  failed_when: false
  when: ndb_os_family in ["RedHat", "Debian"]
  become: yes

- name: Assert firewalld allows SSH
  ansible.builtin.assert:
    that:
      - validate_firewalld_ssh_rule.rc == 0
    fail_msg: "Expected firewalld to allow SSH so saved image clones are reachable"
  when: ndb_os_family in ["RedHat", "Debian"]

- name: Check Debian-family NDB chrony config path
  ansible.builtin.stat:
    path: /etc/chrony.conf
    follow: true
  register: validate_ndb_chrony_conf
  when: ndb_os_family == "Debian"
  become: yes

- name: Assert Debian-family NDB chrony config path exists
  ansible.builtin.assert:
    that:
      - validate_ndb_chrony_conf.stat.exists
    fail_msg: "Expected /etc/chrony.conf to exist for NDB chrony configuration compatibility"
  when: ndb_os_family == "Debian"

- name: Validate Debian-family D-Bus first-boot readiness
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "test -S /run/dbus/system_bus_socket && systemctl is-active dbus.service | grep -Fx active && test -L /etc/systemd/system/sockets.target.wants/dbus.socket && test -L /etc/systemd/system/basic.target.wants/dbus.service && test \"$(readlink /etc/systemd/system/sockets.target.wants/dbus.socket)\" = /lib/systemd/system/dbus.socket && test \"$(readlink /etc/systemd/system/basic.target.wants/dbus.service)\" = /lib/systemd/system/dbus.service"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family captured image has no stale NDB reset script
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "test ! -e /bin/reset_password.sh"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family rc.local has no stale NDB reset hook
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "! grep -q '/bin/reset_password.sh' /etc/rc.local 2>/dev/null"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family NDB reset helper wait mode
  ansible.builtin.command:
    argv:
      - /usr/local/sbin/ndb-run-reset-password
      - --wait-for-script
      - "1"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family SSH reset port gate helper
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "command -v nft >/dev/null && test -x /usr/local/sbin/ndb-ssh-reset-gate && grep -F 'block)' /usr/local/sbin/ndb-ssh-reset-gate && grep -F 'NDB PAM auth waiting for late injected reset script' /usr/local/sbin/ndb-run-reset-password && /usr/local/sbin/ndb-ssh-reset-gate validate-block-rule && /usr/local/sbin/ndb-ssh-reset-gate block-if-reset-intent && ! nft list table inet ndb_ssh_reset_gate >/dev/null 2>&1"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family SSH reset port gate service
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "systemctl is-enabled ndb-ssh-reset-gate.service | grep -Fx enabled && systemctl cat ndb-ssh-reset-gate.service | grep -F 'Type=oneshot' && systemctl cat ndb-ssh-reset-gate.service | grep -F 'ExecStart=/usr/local/sbin/ndb-ssh-reset-gate block-if-reset-intent' && ! systemctl cat ndb-ssh-reset-gate.service | grep -F 'watch-reset-intent' && systemctl cat ndb-ssh-reset-gate.service | grep -F 'Before=sysinit.target basic.target' && ! systemctl cat ndb-ssh-reset-gate.service | grep -E 'Before=.*firewalld.service' && test -L /etc/systemd/system/sysinit.target.wants/ndb-ssh-reset-gate.service"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family SSH PAM reset gate
  ansible.builtin.command:
    argv:
      - grep
      - -E
      - --quiet
      - '^[[:space:]]*auth[[:space:]]+required[[:space:]]+pam_exec\.so[[:space:]]+quiet[[:space:]]+seteuid[[:space:]]+expose_authtok[[:space:]]+/usr/local/sbin/ndb-run-reset-password[[:space:]]+--pam-auth-token[[:space:]]+era[[:space:]]*$'
      - /etc/pam.d/sshd
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family SSH PAM nologin bypass for NDB drive user
  ansible.builtin.command:
    argv:
      - grep
      - -E
      - --quiet
      - '^[[:space:]]*account[[:space:]]+\[success=1[[:space:]]+default=ignore\][[:space:]]+pam_succeed_if\.so[[:space:]]+quiet[[:space:]]+user[[:space:]]+=[[:space:]]+era[[:space:]]*$'
      - /etc/pam.d/sshd
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family SSH PAM account normalization gate
  ansible.builtin.command:
    argv:
      - grep
      - -E
      - --quiet
      - '^[[:space:]]*account[[:space:]]+required[[:space:]]+pam_exec\.so[[:space:]]+quiet[[:space:]]+seteuid[[:space:]]+/usr/local/sbin/ndb-run-reset-password[[:space:]]+--pam-account[[:space:]]+era[[:space:]]*$'
      - /etc/pam.d/sshd
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family reset helper normalizes PAM account state
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "grep -F 'pam_account_user=' /usr/local/sbin/ndb-run-reset-password && grep -F 'usermod --unlock' /usr/local/sbin/ndb-run-reset-password && grep -F 'chage -E -1 -I -1 -m 0 -M 99999' /usr/local/sbin/ndb-run-reset-password && grep -F 'NDB PAM account normalization completed' /usr/local/sbin/ndb-run-reset-password && grep -F 'NDB injected password reset completed during PAM account check' /usr/local/sbin/ndb-run-reset-password"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family SSH reset gate drop-ins
  ansible.builtin.command:
    argv:
      - grep
      - -F
      - --quiet
      - --
      - --wait-for-script 150
      - "{{ item }}"
  loop:
    - /etc/systemd/system/ssh.service.d/10-ndb-reset-password.conf
    - /etc/systemd/system/sshd.service.d/10-ndb-reset-password.conf
  when: ndb_os_family == "Debian"
  changed_when: false
  become: yes

- name: Check Debian-family SSH socket activation state
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - ssh.socket
  register: validate_ndb_ssh_socket_state
  failed_when: false
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Assert Debian-family SSH socket activation cannot bypass reset gate
  ansible.builtin.assert:
    that:
      - validate_ndb_ssh_socket_state.rc != 0 or validate_ndb_ssh_socket_state.stdout == "disabled"
    fail_msg: "Expected ssh.socket to be disabled or absent so socket activation cannot bypass the NDB reset gate"
  when: ndb_os_family == "Debian"

- name: Check Debian-family SSH service enablement after socket activation disablement
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - ssh.service
  register: validate_ndb_ssh_service_state
  failed_when: false
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Assert Debian-family SSH service is enabled after socket activation disablement
  ansible.builtin.assert:
    that:
      - validate_ndb_ssh_service_state.rc == 0
      - validate_ndb_ssh_service_state.stdout == "enabled"
    fail_msg: "Expected ssh.service to be enabled so Debian-family images expose SSH after ssh.socket is disabled"
  when: ndb_os_family == "Debian"

- name: Derive expected MongoDB DB OS user
  ansible.builtin.set_fact:
    validate_mongodb_db_os_user: "{{ 'mongod' if ndb_os_family == 'RedHat' else 'mongodb' }}"

- name: Check MongoDB DB OS user exists
  ansible.builtin.command:
    argv:
      - getent
      - passwd
      - "{{ validate_mongodb_db_os_user }}"
  register: validate_mongodb_db_os_user_result
  changed_when: false
  become: yes

- name: Read GRUB defaults for NDB kernel arguments
  ansible.builtin.slurp:
    src: /etc/default/grub
  register: validate_ndb_grub_defaults
  become: yes

- name: Assert GRUB defaults include NDB kernel arguments
  ansible.builtin.assert:
    that:
      - item in (validate_ndb_grub_defaults.content | b64decode)
    fail_msg: "Expected /etc/default/grub to include {{ item }} for NDB Linux prechecks"
  loop: "{{ validate_ndb_kernel_args }}"

- name: Read Debian GRUB config for NDB root disk mapping
  ansible.builtin.slurp:
    src: /boot/grub/grub.cfg
  register: validate_ndb_grub_cfg
  when: ndb_os_family == "Debian"
  become: yes

- name: Assert Debian GRUB uses device paths for NDB root disk mapping
  ansible.builtin.assert:
    that:
      - "'root=/dev/' in (validate_ndb_grub_cfg.content | b64decode)"
      - "'root=PARTUUID=' not in (validate_ndb_grub_cfg.content | b64decode)"
    fail_msg: "Expected Debian GRUB to use root=/dev/... instead of root=PARTUUID=... so NDB can map the root disk"
  when: ndb_os_family == "Debian"

- name: Validate NDB storage mapping tools
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "command -v parted && command -v lsblk && command -v lsscsi"
  changed_when: false
  become: yes

- name: Validate Debian-family NDB Era device-mapper helper
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "test -x /usr/local/sbin/ndb-era-dm-compat && grep -F 'ntnx_era_agent_vg_*' /usr/local/sbin/ndb-era-dm-compat && grep -F '/dev/${kernel}..' /usr/local/sbin/ndb-era-dm-compat && grep -F 'ln -s \"$dm_dev\" \"$alias\"' /usr/local/sbin/ndb-era-dm-compat && ! grep -F 'mknod ' /usr/local/sbin/ndb-era-dm-compat && grep -F '99-ndb-era-dm-serial.rules' /usr/local/sbin/ndb-era-dm-compat && /usr/local/sbin/ndb-era-dm-compat"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Validate Debian-family NDB Era device-mapper timer
  ansible.builtin.command:
    argv:
      - bash
      - -lc
      - "systemctl is-enabled ndb-era-dm-compat.timer | grep -Fx enabled && systemctl cat ndb-era-dm-compat.service | grep -F 'ExecStart=/usr/local/sbin/ndb-era-dm-compat' && systemctl cat ndb-era-dm-compat.timer | grep -F 'OnBootSec=30s' && systemctl cat ndb-era-dm-compat.timer | grep -F 'OnUnitActiveSec=10s' && systemctl cat ndb-era-dm-compat.timer | grep -F 'WantedBy=timers.target'"
  changed_when: false
  when: ndb_os_family == "Debian"
  become: yes

- name: Check mongod --version
  ansible.builtin.command:
    argv:
      - "{{ validate_mongodb_mongod_binary }}"
      - --version
  register: validate_mongodb_mongod_version
  changed_when: false
  become: yes

- name: Assert mongod binary major version
  ansible.builtin.assert:
    that:
      - validate_mongodb_mongod_version.stdout is regex("db version v" ~ validate_mongodb_major_version ~ "\\.")
    fail_msg: "Expected mongod major version {{ validate_mongodb_major_version }}, got {{ validate_mongodb_mongod_version.stdout | default('') | trim }}"

- name: Check NDB-safe MongoDB software home required binaries
  ansible.builtin.command:
    argv:
      - test
      - -x
      - "{{ validate_mongodb_ndb_software_home }}/bin/{{ item }}"
  loop: "{{ validate_mongodb_ndb_required_binaries }}"
  changed_when: false
  become: yes

- name: Check NDB-safe MongoDB software home binary
  ansible.builtin.command:
    argv:
      - "{{ validate_mongodb_ndb_mongod_binary }}"
      - --version
  register: validate_mongodb_ndb_mongod_version
  changed_when: false
  become: yes

- name: Assert NDB-safe MongoDB software home binary major version
  ansible.builtin.assert:
    that:
      - validate_mongodb_ndb_mongod_version.stdout is regex("db version v" ~ validate_mongodb_major_version ~ "\\.")
    fail_msg: "Expected NDB-safe mongod major version {{ validate_mongodb_major_version }}, got {{ validate_mongodb_ndb_mongod_version.stdout | default('') | trim }}"

- name: Check SELinux runtime mode for MongoDB NDB provisioning (RedHat family)
  ansible.builtin.command:
    argv:
      - getenforce
  register: validate_mongodb_selinux_mode_result
  changed_when: false
  failed_when: false
  when: ndb_os_family == "RedHat"
  become: yes

- name: Assert SELinux is not enforcing for MongoDB NDB provisioning (RedHat family)
  ansible.builtin.assert:
    that:
      - validate_mongodb_selinux_mode_result.stdout | default('Disabled') | trim != "Enforcing"
    fail_msg: "Expected SELinux permissive or disabled for MongoDB NDB provisioning, got {{ validate_mongodb_selinux_mode_result.stdout | default('unknown') | trim }}"
  when: ndb_os_family == "RedHat"

- name: Start packaged mongod temporarily for validation
  ansible.builtin.service:
    name: mongod
    state: started
    enabled: false
  become: yes

- name: Check packaged mongod service is active for validation
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - mongod.service
  register: validate_mongodb_mongod_active_result
  retries: "{{ validate_mongodb_service_active_retries }}"
  delay: "{{ validate_mongodb_service_active_delay }}"
  until: validate_mongodb_mongod_active_result.stdout == "active"
  changed_when: false
  failed_when: false
  become: yes

- name: Assert packaged mongod service started for validation
  ansible.builtin.assert:
    that:
      - validate_mongodb_mongod_active_result.stdout == "active"
    fail_msg: "Expected mongod.service active for validation, got {{ validate_mongodb_mongod_active_result.stdout | default('') | trim }}"

- name: Check MongoDB server version with mongosh
  ansible.builtin.command:
    argv:
      - "{{ validate_mongodb_mongosh_binary }}"
      - --quiet
      - --eval
      - "db.version()"
  register: validate_mongodb_server_version
  changed_when: false
  become: yes

- name: Assert MongoDB server major version
  ansible.builtin.assert:
    that:
      - validate_mongodb_server_version.stdout is regex("^" ~ validate_mongodb_major_version ~ "\\.")
    fail_msg: "Expected MongoDB server major version {{ validate_mongodb_major_version }}, got {{ validate_mongodb_server_version.stdout | default('') | trim }}"

- name: Check MongoDB edition with buildInfo
  ansible.builtin.command:
    argv:
      - "{{ validate_mongodb_mongosh_binary }}"
      - --quiet
      - --eval
      - 'const modules = db.runCommand({buildInfo:1}).modules || []; print(modules.includes("enterprise") ? "enterprise" : "community")'
  register: validate_mongodb_edition_result
  changed_when: false
  become: yes

- name: Assert MongoDB edition matches matrix selection
  ansible.builtin.assert:
    that:
      - (validate_mongodb_edition_result.stdout | trim) == (mongodb_edition | default('community'))
    fail_msg: "Expected MongoDB edition {{ mongodb_edition | default('community') }}, got {{ validate_mongodb_edition_result.stdout | default('') | trim }}"

- name: Install replica-set validation script
  ansible.builtin.copy:
    src: validate_mongodb_replica_set.sh
    dest: "{{ validate_mongodb_replica_set_script_path }}"
    owner: root
    group: root
    mode: "0755"
  when: "'replica-set' in validate_mongodb_deployments"
  become: yes

- name: Run local MongoDB replica-set smoke validation
  ansible.builtin.command:
    argv:
      - "{{ validate_mongodb_replica_set_script_path }}"
  changed_when: false
  when: "'replica-set' in validate_mongodb_deployments"
  become: yes

- name: Install sharded validation script
  ansible.builtin.copy:
    src: validate_mongodb_sharded.sh
    dest: "{{ validate_mongodb_sharded_script_path }}"
    owner: root
    group: root
    mode: "0755"
  when: "'sharded-cluster' in validate_mongodb_deployments"
  become: yes

- name: Run local MongoDB sharded topology smoke validation
  ansible.builtin.command:
    argv:
      - "{{ validate_mongodb_sharded_script_path }}"
  changed_when: false
  when: "'sharded-cluster' in validate_mongodb_deployments"
  become: yes

- name: Stop and disable packaged mongod after validation
  ansible.builtin.service:
    name: mongod
    state: stopped
    enabled: false
  become: yes

- name: Check packaged mongod service is inactive
  ansible.builtin.command:
    argv:
      - systemctl
      - is-active
      - mongod.service
  register: validate_mongodb_mongod_inactive_result
  changed_when: false
  failed_when: false
  become: yes

- name: Assert packaged mongod service is inactive
  ansible.builtin.assert:
    that:
      - validate_mongodb_mongod_inactive_result.stdout == "inactive"
    fail_msg: "Expected mongod.service inactive before image capture, got {{ validate_mongodb_mongod_inactive_result.stdout | default('') | trim }}"

- name: Check packaged mongod service is disabled
  ansible.builtin.command:
    argv:
      - systemctl
      - is-enabled
      - mongod.service
  register: validate_mongodb_mongod_disabled_result
  changed_when: false
  failed_when: false
  become: yes

- name: Assert packaged mongod service is disabled
  ansible.builtin.assert:
    that:
      - validate_mongodb_mongod_disabled_result.stdout == "disabled"
    fail_msg: "Expected mongod.service disabled before image capture, got {{ validate_mongodb_mongod_disabled_result.stdout | default('') | trim }}"

- name: Check MongoDB listener port is free
  ansible.builtin.shell: "ss -ltn '( sport = :{{ validate_mongodb_listener_port }} )' | awk 'NR > 1 {count++} END {print count + 0}'"
  register: validate_mongodb_listener_port_result
  changed_when: false
  become: yes

- name: Assert MongoDB listener port is free
  ansible.builtin.assert:
    that:
      - (validate_mongodb_listener_port_result.stdout | int) == 0
    fail_msg: "Expected port {{ validate_mongodb_listener_port }} to be free before image capture, got {{ validate_mongodb_listener_port_result.stdout | default('') | trim }} listener(s)"
