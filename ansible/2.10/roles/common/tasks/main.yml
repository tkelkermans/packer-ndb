---
- name: Install dnf config-manager support (RedHat family)
  ansible.builtin.package:
    name: dnf-plugins-core
    state: present
  when: ansible_os_family == "RedHat"
  become: yes

- name: Enable CRB repository (Rocky Linux)
  ansible.builtin.command:
    argv:
      - dnf
      - config-manager
      - --set-enabled
      - crb
  when: ansible_distribution == 'Rocky'
  become: yes

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    lock_timeout: 600
  register: apt_cache_update_result
  retries: 6
  delay: 10
  until: apt_cache_update_result is succeeded
  when: ansible_os_family == "Debian"
  become: yes

- name: Ensure OpenSSL stack is up to date (RedHat family)
  ansible.builtin.dnf:
    name:
      - openssl
      - openssl-libs
    state: latest
  when: ansible_os_family == "RedHat"
  become: yes

- name: Ensure OpenSSL stack is up to date (Debian family)
  ansible.builtin.apt:
    name:
      - openssl
      - libssl3
    state: latest
    lock_timeout: 600
  register: apt_openssl_result
  retries: 6
  delay: 10
  until: apt_openssl_result is succeeded
  when: ansible_os_family == "Debian"
  become: yes

- name: Clean dnf metadata cache (RedHat family)
  ansible.builtin.command:
    argv:
      - dnf
      - clean
      - all
  register: dnf_clean_result
  retries: 5
  delay: 5
  until: dnf_clean_result.rc == 0
  changed_when: false
  when: ansible_os_family == "RedHat"
  become: yes

- name: Refresh dnf metadata (RedHat family)
  ansible.builtin.command:
    argv:
      - dnf
      - -y
      - makecache
  register: dnf_makecache_result
  retries: 5
  delay: 10
  until: dnf_makecache_result.rc == 0
  changed_when: false
  when: ansible_os_family == "RedHat"
  become: yes

- name: Install common packages (RedHat family)
  ansible.builtin.package:
    name: "{{ common_packages }}"
    state: present
  when: ansible_os_family == "RedHat"
  become: yes

- name: Install common packages (Debian family)
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    lock_timeout: 600
  register: apt_common_packages_result
  retries: 6
  delay: 10
  until: apt_common_packages_result is succeeded
  when: ansible_os_family == "Debian"
  become: yes

- name: Install Red Hat specific packages
  ansible.builtin.package:
    name: "{{ redhat_packages }}"
    state: present
  when: ansible_os_family == "RedHat"
  become: yes

- name: Install Debian specific packages
  ansible.builtin.apt:
    name: "{{ debian_packages }}"
    state: present
    lock_timeout: 600
  register: apt_debian_packages_result
  retries: 6
  delay: 10
  until: apt_debian_packages_result is succeeded
  when: ansible_os_family == "Debian"
  become: yes

- name: Remove UFW on Debian systems
  ansible.builtin.apt:
    name: ufw
    state: absent
    lock_timeout: 600
  register: apt_remove_ufw_result
  retries: 6
  delay: 10
  until: apt_remove_ufw_result is succeeded
  when: ansible_os_family == "Debian"
  become: yes

- name: Ensure AppArmor disable directory exists (Ubuntu 24.04 workaround)
  ansible.builtin.file:
    path: /etc/apparmor.d/disable
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: ansible_distribution == "Ubuntu" and ansible_distribution_version == "24.04"
  become: yes

- name: Disable rsyslogd AppArmor profile for Ubuntu 24.04
  ansible.builtin.file:
    src: /etc/apparmor.d/usr.sbin.rsyslogd
    dest: /etc/apparmor.d/disable/usr.sbin.rsyslogd
    state: link
    force: true
  when: ansible_distribution == "Ubuntu" and ansible_distribution_version == "24.04"
  become: yes

- name: Ensure firewalld service is enabled
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
  when: ansible_os_family in ["RedHat", "Debian"]
  become: yes

- name: Ensure chrony service is enabled
  ansible.builtin.service:
    name: "{{ 'chronyd' if ansible_os_family == 'RedHat' else 'chrony' }}"
    state: started
    enabled: true
  become: yes

- name: Ensure cron service is running
  ansible.builtin.service:
    name: "{{ 'crond' if ansible_os_family == 'RedHat' else 'cron' }}"
    state: started
    enabled: true
  become: yes

- name: Ensure secure_path is present in /etc/sudoers
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    line: "Defaults    secure_path = /sbin:/bin:/usr/sbin:/usr/bin"
    regexp: '^Defaults\s+secure_path\s*='
    validate: 'visudo -cf %s'
  become: yes

- name: Disable requiretty in /etc/sudoers
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: '^Defaults    requiretty'
    state: absent
    validate: 'visudo -cf %s'
  become: yes

- name: Ensure /tmp has correct permissions (1777 with sticky bit)
  ansible.builtin.file:
    path: /tmp
    mode: '1777'
    state: directory
  become: yes

- name: Configure NDB sudoers policy
  ansible.builtin.template:
    src: ndb_sudoers.j2
    dest: /etc/sudoers.d/ndb
    owner: root
    group: root
    mode: '0440'
    validate: 'visudo -cf %s'
  when: configure_ndb_sudoers | bool
  become: yes
