---
- name: Normalize OS facts
  ansible.builtin.set_fact:
    ndb_os_family: "{{ ansible_facts['os_family'] }}"

- name: Check cloud-init availability
  ansible.builtin.stat:
    path: /usr/bin/cloud-init
  register: image_prepare_cloud_init

- name: Remove generated cloud-init netplan on Debian-family images
  ansible.builtin.file:
    path: /etc/netplan/50-cloud-init.yaml
    state: absent
  when: ndb_os_family == "Debian"
  become: yes

- name: Check subscription-manager availability
  ansible.builtin.shell:
    cmd: command -v subscription-manager
  register: image_prepare_subscription_manager
  changed_when: false
  failed_when: false
  when: ndb_os_family == "RedHat"

- name: Unregister RHEL subscription before image capture
  ansible.builtin.command:
    cmd: subscription-manager unregister
  register: image_prepare_rhel_unregister
  changed_when: false
  failed_when: false
  no_log: true
  become: yes
  when:
    - ndb_os_family == "RedHat"
    - rhel_subscription_enabled | default(false) | bool
    - image_prepare_subscription_manager.rc | default(1) == 0

- name: Clean RHEL subscription state before image capture
  ansible.builtin.command:
    cmd: subscription-manager clean
  changed_when: false
  failed_when: false
  no_log: true
  become: yes
  when:
    - ndb_os_family == "RedHat"
    - rhel_subscription_enabled | default(false) | bool
    - image_prepare_subscription_manager.rc | default(1) == 0

- name: Reset cloud-init state for cloned image first boot
  ansible.builtin.command:
    cmd: /usr/bin/cloud-init clean --logs --machine-id
  when: image_prepare_cloud_init.stat.exists
  changed_when: true
  become: yes

- name: Flush filesystem buffers before image capture
  ansible.builtin.command:
    cmd: sync
  changed_when: false
  become: yes
